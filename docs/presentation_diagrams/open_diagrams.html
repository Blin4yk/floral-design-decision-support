<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Диаграммы Flora Vision</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
    }

    section {
      margin-bottom: 36px;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #000000;
      border-radius: 14px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    img {
      width: 100%;
      height: auto;
      border: 1px solid #000000;
      border-radius: 10px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <h1>Диаграммы Flora Vision для презентации</h1>

  <section>
    <h2>Программная реализация</h2>
    <img src="./software_implementation_architecture.svg" alt="Схема программной реализации">
  </section>

  <section>
    <h2>UML-диаграмма компонентов</h2>
    <img src="./uml_component_diagram.svg" alt="UML-диаграмма компонентов">
  </section>
</body>
</html>
