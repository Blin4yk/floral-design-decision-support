services:
  db:
    image: postgres:17-alpine
    container_name: plant_db
    environment:
      POSTGRES_USER: plantuser
      POSTGRES_PASSWORD: plantpass
      POSTGRES_DB: plantdb
    volumes:
      - plant_picker_pgdata:/var/lib/postgresql/data
      - ./dump_plants.sql:/docker-entrypoint-initdb.d/01_dump_plants.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantuser -d plantdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: plant_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://plantuser:plantpass@db:5432/plantdb
    depends_on:
      db:
        condition: service_healthy
    # Монтируем код внутрь пакета: /app/app/..., иначе затирается /app и пропадает модуль ``app``
    volumes:
      - ./app:/app/app
      - ./photos:/app/photos:ro

volumes:
  plant_picker_pgdata: