services:
  db:
    image: postgres:16-alpine
    container_name: plant-db
    environment:
      - POSTGRES_DB=plantdb
      - POSTGRES_USER=plantuser
      - POSTGRES_PASSWORD=plantpass
    ports:
      - "5432:5432"
    volumes:
      - plant_picker_pgdata:/var/lib/postgresql/data
      - ./plant_picker_backend/dump_plants.sql:/docker-entrypoint-initdb.d/01_dump_plants.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantuser -d plantdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flora-frontend
    environment:
      - VITE_PROXY_TARGET=http://plant-api:8000
    ports:
      - "5173:5173"
    depends_on:
      - plant-api

  plant-api:
    build:
      context: ./plant_picker_backend
      dockerfile: Dockerfile
    container_name: plant-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://plantuser:plantpass@db:5432/plantdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./plant_picker_backend/app:/app/app
      - ./plant_picker_backend/photos:/app/photos:ro

volumes:
  plant_picker_pgdata:
