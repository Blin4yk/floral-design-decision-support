  <text x="462" y="512" font-size="14" fill="#1a2e1a" font-family="Arial, sans-serif">украшают сад с июля по сентябрь.</text>
  <text x="462" y="540" font-size="14" fill="#5a6e57" font-family="Arial, sans-serif">Устойчива к засухе и болезням. Хорошо сочетается с злаками,</text>
  <text x="462" y="562" font-size="14" fill="#5a6e57" font-family="Arial, sans-serif">рудбекией и шалфеем. Морозостойка до −35°C, зона 3–9.</text>
